name: PR Title

# Validate that the pull-request title follows Conventional Commits. Because
# the repo squash-merges, the PR title becomes the squashed commit subject —
# which release-please (added in a follow-up PR) parses to decide version
# bumps and CHANGELOG sections.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: conventional PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            chore
            ci
            build
            test
            refactor
            style
