name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------
  # Plan — decides what runs and what matrix shape to use. Mirrors the
  # pattern from schubydoo/dockerize2.
  #
  # On push / schedule / workflow_dispatch: everything runs on the full
  # 3x3 matrix. The master-push run is the single source of "we tested
  # on every supported platform."
  #
  # On pull_request: detect what changed, default to a single
  # ubuntu-latest × 3.13 cell (fast, catches >95% of regressions); skip
  # tests + image-smoke entirely if no Python / Dockerfile / deps moved.
  #
  # PR labels:
  #   test:full  - force the full 3x3 matrix on this PR
  #   test:skip  - skip tests + image-smoke entirely (e.g. a CI plumbing
  #                PR that doesn't change the test surface)
  # --------------------------------------------------------------------
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      python_changed: ${{ steps.plan.outputs.python_changed }}
      image_changed: ${{ steps.plan.outputs.image_changed }}
      run_tests: ${{ steps.plan.outputs.run_tests }}
      run_image_smoke: ${{ steps.plan.outputs.run_image_smoke }}
      matrix_os: ${{ steps.plan.outputs.matrix_os }}
      matrix_python: ${{ steps.plan.outputs.matrix_python }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Plan
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # Defaults: non-PR events (push / schedule / dispatch) run the
          # full suite on the full matrix. master push is the canonical
          # "full platform coverage" gate.
          python_changed=true
          image_changed=true
          run_tests=true
          run_image_smoke=true
          matrix_os='["ubuntu-latest","macos-latest","windows-latest"]'
          matrix_python='["3.11","3.12","3.13"]'

          if [ "$EVENT" = "pull_request" ]; then
            git fetch origin "${BASE_REF}" --depth=50
            files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            echo "Changed files:"
            printf '%s\n' "$files"

            # Detect kind of change.
            python_changed=false
            image_changed=false
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                src/*|tests/*|pyproject.toml|uv.lock) python_changed=true ;;
              esac
              case "$f" in
                Dockerfile|.dockerignore|pyproject.toml|uv.lock|src/*) image_changed=true ;;
              esac
            done <<< "$files"

            # PR labels.
            has_full=false
            has_skip=false
            if echo "$LABELS" | grep -q '"test:full"'; then has_full=true; fi
            if echo "$LABELS" | grep -q '"test:skip"'; then has_skip=true; fi

            # Trim PR matrix to one cell unless test:full opts in.
            if [ "$has_full" = false ]; then
              matrix_os='["ubuntu-latest"]'
              matrix_python='["3.13"]'
            fi

            # Skip optional jobs when nothing relevant changed, or when
            # the maintainer opts out explicitly.
            if [ "$has_skip" = true ] || [ "$python_changed" = false ]; then
              run_tests=false
            fi
            if [ "$has_skip" = true ] || [ "$image_changed" = false ]; then
              run_image_smoke=false
            fi
          fi

          {
            echo "python_changed=$python_changed"
            echo "image_changed=$image_changed"
            echo "run_tests=$run_tests"
            echo "run_image_smoke=$run_image_smoke"
            echo "matrix_os=$matrix_os"
            echo "matrix_python=$matrix_python"
          } >> "$GITHUB_OUTPUT"

          echo "==== Plan ===="
          echo "  event:           $EVENT"
          echo "  python_changed:  $python_changed"
          echo "  image_changed:   $image_changed"
          echo "  run_tests:       $run_tests"
          echo "  run_image_smoke: $run_image_smoke"
          echo "  matrix_os:       $matrix_os"
          echo "  matrix_python:   $matrix_python"

  # --------------------------------------------------------------------
  # Unit tests across the planned matrix. PRs default to a single cell;
  # master push runs the full 3x3.
  # --------------------------------------------------------------------
  tests:
    name: tests (${{ matrix.os }}, ${{ matrix.python-version }})
    needs: plan
    if: needs.plan.outputs.run_tests == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.plan.outputs.matrix_os) }}
        python-version: ${{ fromJSON(needs.plan.outputs.matrix_python) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Matrix values flow through an env var (rather than being inlined
      # as `${{ matrix.python-version }}`) so zizmor's template-injection
      # static analysis doesn't flag the `run:` blocks. The matrix is
      # hard-coded in the plan job (only ever one of two arrays) and not
      # derived from any PR-controllable source.
      - name: Set up Python ${{ matrix.python-version }}
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"
      - name: Install
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv sync --extra dev --python "$PYTHON_VERSION"
      - name: pytest
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv run --python "$PYTHON_VERSION" pytest -q --cov=dump1090exporter --cov-report=term-missing

  # --------------------------------------------------------------------
  # Build sdist + wheel. Cheap; runs on every push and PR so we always
  # know the package is shippable.
  # --------------------------------------------------------------------
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Upload dist artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------
  # Image smoke — three things, in order of cost:
  #   1. Build the multi-stage Dockerfile for amd64 (load) and exercise
  #      the actual metrics server against the bundled golden-data
  #      fixtures. Catches editable-install regressions, broken aiohttp
  #      C extensions, wrong PYTHONPATH, etc — everything `--help`
  #      doesn't.
  #   2. Cross-build for arm64 and armv7 under QEMU (no load). Catches
  #      musllinux wheel gaps and arm-specific build breaks BEFORE
  #      release.yml tries to publish the multi-arch manifest. Per the
  #      dockerize2 lesson "default buildx driver lies", we deliberately
  #      use the same docker-container driver release.yml will use.
  #   3. Size guard on the loaded amd64 image — catches accidental
  #      base/dep bloat.
  #
  # Gated on image_changed so docs-only / workflow-only PRs don't pay
  # the build cost. Always runs on master push to keep the baseline.
  # --------------------------------------------------------------------
  image-smoke:
    name: image smoke
    needs: plan
    if: needs.plan.outputs.run_image_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build image (amd64, load)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: dump1090exporter:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Functional smoke — exporter serves /metrics with golden data
        # Runs the container in file-resource mode against the test
        # fixtures shipped in tests/golden-data/, waits for /metrics to
        # come up, and asserts the canonical metric names are present.
        # Catches the kind of breakage `--help` can't (e.g. the
        # editable-install bug fixed in #14).
        run: |
          set -euo pipefail
          docker run -d --name d1090smoke \
            -v "$PWD/tests/golden-data:/data:ro" \
            -p 9105:9105 \
            dump1090exporter:smoke \
            --resource-path=/data \
            --latitude=-34.9285 \
            --longitude=138.6007 \
            --log-level=debug

          # Poll for the metrics server up to ~30s.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9105/metrics >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Capture once, sanity-check multiple invariants.
          body=$(curl -fsS http://127.0.0.1:9105/metrics)
          echo "---- /metrics (first 30 lines) ----"
          echo "$body" | head -30
          echo "---- container logs (first 30 lines) ----"
          docker logs d1090smoke 2>&1 | head -30

          # Required: the three core gauge labels are present and namespaced.
          echo "$body" | grep -q '^dump1090_messages_total{'
          echo "$body" | grep -q '^dump1090_recent_aircraft_observed{'
          echo "$body" | grep -q '^dump1090_stats_messages_total{'

          docker rm -f d1090smoke
      - name: Cross-build image for arm64 + armv7 (no load)
        # Verifies the Dockerfile works under QEMU for the two non-amd64
        # arches the release pipeline ships. Catches musllinux wheel
        # gaps and arm-specific issues before release.yml tries to
        # publish the multi-arch manifest.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64,linux/arm/v7
          push: false
          tags: dump1090exporter:smoke-arm
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Size guard — image must stay reasonable (< 150 MB compressed)
        # python:3.13-alpine base + the venv. 150 MB compressed is comfortable
        # for the alpine variant; the previous slim-based image needed 250 MB.
        # Catches accidental ~30 MB additions (stranded apk layer, unintended
        # dev dep, etc).
        run: |
          set -euo pipefail
          bytes=$(docker save dump1090exporter:smoke | gzip -c | wc -c)
          mb=$((bytes / 1024 / 1024))
          echo "Image (docker save | gzip): ${mb} MB (${bytes} bytes)"
          if [ "$mb" -gt 150 ]; then
            echo "::error::Image exceeded 150 MB threshold: ${mb} MB"
            exit 1
          fi

  # --------------------------------------------------------------------
  # Required-checks aggregator. ONE check for branch protection to gate
  # on regardless of how many underlying jobs exist. `if: always()` so
  # it runs even when needs failed; jq fails the aggregator iff any
  # listed job is not success-or-skipped.
  #
  # Add a new ci.yml job by appending to `needs:` — nothing else to
  # change. Branch protection lists this one name.
  # --------------------------------------------------------------------
  ci-required-checks-passed:
    name: ci required checks passed
    if: always()
    needs:
      - plan
      - tests
      - build
      - image-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key): \(.value.result)"
          ')
          if [ -n "$failing" ]; then
            echo "Failed or cancelled jobs:"
            echo "$failing"
            exit 1
          fi
          echo "All required jobs passed (or were intentionally skipped)."
