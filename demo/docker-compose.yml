# Demo stack: dump1090-exporter wired into Prometheus + Grafana for local
# experimentation. Container images are pinned so Renovate can track them.
# `version:` is intentionally omitted — Compose v2 ignores it.

volumes:
  grafana_data: {}
  prometheus_data: {}

services:

  dump1090exporter:
    container_name: dump1090exporter
    build: ..
    ports:
      - "9105:9105"
    restart: always
    stop_signal: SIGINT
    command:
      - "--resource-path=http://192.168.1.201:8080"
      - "--latitude=-34.9285"
      - "--longitude=138.6007"

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.0.0
    depends_on:
      - dump1090exporter
    volumes:
      - ./prometheus/:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - 9090:9090
    restart: always

  grafana:
    container_name: grafana
    image: grafana/grafana:11.4.0
    user: "104"
    depends_on:
      - prometheus
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    env_file:
      - ./grafana/config.monitoring
    restart: always
